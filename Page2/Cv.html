<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aldosimone Di Rosa — CV</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
        }
        .cv-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .cv-header {
            margin-bottom: 16px;
            text-align: center;
        }
        .cv-header h1 {
            margin: 0;
            font-size: 24px;
        }
        .cv-header p {
            margin: 4px 0 0;
            font-size: 14px;
            opacity: 0.8;
        }
        .language-switcher {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .language-btn {
            padding: 8px 16px;
            border: 2px solid #4ea1ff;
            background-color: transparent;
            color: #4ea1ff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .language-btn.active {
            background-color: #4ea1ff;
            color: #0f0f0f;
        }
        .language-btn:hover {
            opacity: 0.8;
        }
        .cv-frame {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            border: none;
            background-color: #ffffff;
        }
        .download-link {
            margin-top: 12px;
            font-size: 14px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .download-link a {
            color: #4ea1ff;
            text-decoration: none;
        }
        .download-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="cv-wrapper">
        <div class="cv-header">
            <h1>Aldosimone Di Rosa</h1>
            <p>Frontend Developer (React) · Full-Stack aware · Open to US Remote</p>
        </div>

        <div class="language-switcher">
            <button class="language-btn active" onclick="switchLanguage('it')">🇮🇹 Italiano</button>
            <button class="language-btn" onclick="switchLanguage('en')">🇬🇧 English</button>
        </div>

        <iframe
            id="cv-iframe"
            class="cv-frame"
            src="/CV Aldosimone Di Rosa IT.pdf"
            title="Aldosimone Di Rosa CV">
        </iframe>

        <div class="download-link">
            <a id="download-link" href="/CV Aldosimone Di Rosa IT.pdf" target="_blank">
                Download CV (PDF)
            </a>
        </div>
    </div>

    <script>
        function switchLanguage(lang) {
            const pdfName = lang === 'it' 
                ? '/CV Aldosimone Di Rosa IT.pdf' 
                : '/CV Aldosimone Di Rosa EN.pdf';
            
            document.getElementById('cv-iframe').src = pdfName;
            document.getElementById('download-link').href = pdfName;
            
            document.querySelectorAll('.language-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
    </script>

</body>
</html>
